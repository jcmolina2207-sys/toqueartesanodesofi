<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="../img/Logoico.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style.css">
    <title>TOQUE ARTESANO DE SOFI | Productos</title>

    <style>
        /* ── Sobreescribir el main del CSS global ── */
        main {
            display: block;
            min-height: unset;
        }

        /* ── Sección intro ── */
        .seccion-intro {
            text-align: center;
            padding: 1.8rem 1rem 0.5rem;
            color: #1a3a4a;
        }
        .seccion-intro h2 { font-size: 1.5rem; margin-bottom: 0.3rem; }
        .seccion-intro p  { font-size: 0.95rem; color: #3a5a6a; }

        /* ── Grilla de categorías ── */
        .productos-lista {
            display: flex;
            flex-wrap: wrap;
            gap: 1.5rem;
            justify-content: center;
            padding: 1.5rem 1rem 0.5rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        .categoria {
            background: #f5f0eb;
            border-radius: 12px;
            padding: 1.2rem 1.4rem;
            flex: 1 1 260px;
            max-width: 100%;
            box-shadow: 0 2px 8px rgba(7,47,66,.10);
        }

        /* Tablet: 2 columnas */
        @media (max-width: 768px) {
            .categoria {
                flex: 1 1 calc(50% - 1.5rem);
            }
        }

        /* Móvil: 1 columna */
        @media (max-width: 500px) {
            .productos-lista {
                padding: 1rem 0.75rem 0.5rem;
                gap: 1rem;
            }
            .categoria {
                flex: 1 1 100%;
            }
        }

        .categoria h2 {
            font-size: 1.1rem;
            color: #072f42;
            margin-bottom: 0.6rem;
            border-bottom: 2px solid #a8c8d8;
            padding-bottom: 0.3rem;
        }

        .categoria h3 {
            font-size: 0.82rem;
            color: #3a5a6a;
            margin: 0.8rem 0 0.3rem;
            text-transform: uppercase;
            letter-spacing: .04em;
        }

        .categoria ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        /* ── Fila de producto ── */
        .categoria li {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.35rem 0;
            border-bottom: 1px solid #e0d8d0;
        }
        .categoria li:last-child { border-bottom: none; }

        .nombre-producto {
            flex: 1;
            font-size: 0.9rem;
            color: #072f42;
            cursor: pointer;
            text-decoration: underline dotted #a8c8d8;
            transition: color .15s;
        }
        .nombre-producto:hover { color: #0a4a67; }

        .precio {
            font-size: 0.85rem;
            font-weight: 700;
            color: #1a3a4a;
            white-space: nowrap;
            min-width: 60px;
            text-align: right;
        }

        /* ── Controles +/- ── */
        .cantidad-control {
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }
        .cantidad-control button {
            width: 24px;
            height: 24px;
            border: none;
            border-radius: 50%;
            background: #072f42;
            color: #fff;
            font-size: 1rem;
            line-height: 1;
            cursor: pointer;
            transition: background .15s;
            padding: 0;
        }
        .cantidad-control button:hover { background: #0a4a67; }
        .cantidad-control .cantidad {
            min-width: 20px;
            text-align: center;
            font-size: 0.9rem;
            font-weight: 700;
            color: #072f42;
        }

        /* ── Botón finalizar ── */
        .btn-finalizar-wrap {
            text-align: center;
            padding: 1.2rem 0 2rem;
        }
        .btn-finalizar {
            background-color: #072f42;
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 0.75rem 2.2rem;
            font-size: 1rem;
            font-family: 'Lato', sans-serif;
            font-weight: 700;
            cursor: pointer;
            transition: background .2s, transform .1s;
            box-shadow: 0 3px 10px rgba(7,47,66,.25);
        }
        .btn-finalizar:hover  { background: #0a4a67; }
        .btn-finalizar:active { transform: scale(.97); }

        /* ── Modal imagen ── */
        #modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,.65);
            z-index: 999;
            justify-content: center;
            align-items: center;
            cursor: zoom-out;
        }
        #modal.activo { display: flex; }

        .modal-contenido {
            background: #f5f0eb;
            border-radius: 14px;
            padding: 1.2rem;
            max-width: 90vw;
            max-height: 90vh;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0,0,0,.4);
            cursor: default;
            animation: popIn .2s ease;
        }
        @keyframes popIn {
            from { transform: scale(.85); opacity: 0; }
            to   { transform: scale(1);  opacity: 1; }
        }
        .modal-contenido img {
            max-width: 100%;
            max-height: 65vh;
            border-radius: 8px;
            object-fit: contain;
            display: block;
            margin: 0 auto;
        }
        .modal-contenido p {
            margin-top: 0.7rem;
            font-weight: 700;
            color: #072f42;
            font-size: 1rem;
        }
        .modal-cerrar {
            position: absolute;
            top: 1rem;
            right: 1.2rem;
            background: #fff;
            border: none;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            font-size: 1.1rem;
            cursor: pointer;
            line-height: 1;
            box-shadow: 0 2px 6px rgba(0,0,0,.2);
        }
        /* ── Toast (reemplaza los alert) ── */
        #toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background-color: #072f42;
            color: #fff;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-size: 0.95rem;
            font-family: 'Lato', sans-serif;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease, transform 0.3s ease;
            z-index: 9999;
            white-space: nowrap;
        }
        #toast.visible {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
    </style>
</head>
<body>
    <header class="header">
        <a href="../index.html">
            <img src="../img/Logo.jpg" alt="Logo">
        </a>
        <nav>
            <ul>
                <li><a href="../index.html">Inicio</a></li>
                <li><a href="productos.html">Productos</a></li>
                <li><a href="contacto.html">Contacto</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="seccion-intro">
            <h2>Bienvenidos a nuestra tienda</h2>
            <p>Hacé clic sobre un producto para ver la foto · Usá +/− para elegir cantidad · Luego presioná <strong>Finalizar pedido</strong></p>
        </div>

        <!-- RENDERIZADO DINÁMICO: JS genera las categorías a partir de productos.json -->
        <div class="productos-lista" id="productos-lista">
            <p style="text-align:center; color:#3a5a6a;">Cargando productos...</p>
        </div>

        <div class="btn-finalizar-wrap">
            <button class="btn-finalizar" onclick="finalizarPedido()">Finalizar pedido 🛒</button>
        </div>
    </main>

    <!-- TOAST: mensaje flotante que reemplaza los alert() -->
    <div id="toast"></div>

    <!-- MODAL -->
    <div id="modal" onclick="cerrarModal(event)">
        <div class="modal-contenido" onclick="event.stopPropagation()">
            <button class="modal-cerrar" onclick="cerrarModal()">✕</button>
            <img id="modal-img" src="" alt="">
            <p id="modal-titulo"></p>
        </div>
    </div>

    <footer class="footer">
        <div class="footer-logo">
            <img src="../img/logo2.png" alt="Toque Artesano de Sofi">
        </div>
        <div class="footer-contacto">
            <a href="https://wa.me/541111111111" target="_blank">
                <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WhatsApp">
                11-2407-5797
            </a>
            <a href="https://instagram.com/toqueartesanodesofi" target="_blank">
                <img src="https://upload.wikimedia.org/wikipedia/commons/a/a5/Instagram_icon.png" alt="Instagram">
                /toqueartesanodesofi
            </a>
        </div>
    </footer>
    <div class="footer-derechos">
        © 2026 Toque Artesano de Sofi – Todos los derechos reservados.
    </div>

    <script>

        /* ── Función auxiliar: genera el HTML de una fila de producto ── */
        function crearFilaProducto(p) {
            // Escapamos las comillas de la imagen y el nombre para usarlos en onclick
            const imgEsc    = p.imagen.replace(/'/g, "\\'");
            const nombreEsc = p.nombre.replace(/'/g, "\\'");
            return `
                <li>
                    <span class="nombre-producto" onclick="abrirModal('${imgEsc}','${nombreEsc}')">${p.nombre}</span>
                    <span class="precio">${p.precio}</span>
                    <div class="cantidad-control">
                        <button onclick="cambiarCantidad(this,-1)">−</button>
                        <span class="cantidad">0</span>
                        <button onclick="cambiarCantidad(this,1)">+</button>
                    </div>
                </li>`;
        }

        /* ── Función auxiliar: genera el HTML de una categoría completa ── */
        function crearCategoria(cat) {
            let html = `<div class="categoria"><h2>${cat.categoria}</h2>`;

            if (cat.productos) {
                // Categoría simple (sin subcategorías)
                html += '<ul>' + cat.productos.map(crearFilaProducto).join('') + '</ul>';
            } else if (cat.subcategorias) {
                // Categoría con subcategorías (ej: Churros por unidad / docena)
                cat.subcategorias.forEach(sub => {
                    html += `<h3>${sub.titulo}</h3>`;
                    html += '<ul>' + sub.productos.map(crearFilaProducto).join('') + '</ul>';
                });
            }

            html += '</div>';
            return html;
        }

        /* ── Carga de productos desde el JSON con fetch + async/await ── */
        async function cargarProductos() {
            const contenedor = document.getElementById('productos-lista');
            try {
                const respuesta = await fetch('productos.json');
                const categorias = await respuesta.json();

                // Generar el HTML de todas las categorías y volcarlo al DOM
                contenedor.innerHTML = categorias.map(crearCategoria).join('');

                // LOCALSTORAGE: restaurar cantidades guardadas de la sesión anterior
                restaurarCarrito();
            } catch (error) {
                contenedor.innerHTML = '<p style="text-align:center; color:#c0392b;">Error al cargar los productos. Recargá la página.</p>';
                console.error('Error cargando productos.json:', error);
            }
        }

        // Ejecutar al cargar la página
        cargarProductos();

        /* ── Toast: reemplaza los alert() ── */
        // Muestra un mensaje flotante que desaparece solo después de 3 segundos
        function mostrarAviso(mensaje) {
            const toast = document.getElementById('toast');
            toast.textContent = mensaje;
            toast.classList.add('visible');
            setTimeout(() => toast.classList.remove('visible'), 3000);
        }

        /* ── Controles de cantidad ── */
        function cambiarCantidad(btn, delta) {
            const span = btn.parentElement.querySelector('.cantidad');
            let val = parseInt(span.textContent) + delta;
            if (val < 0) val = 0;
            span.textContent = val;
            // LOCALSTORAGE: guardar el carrito completo después de cada cambio
            guardarCarrito();
        }

        /* ── Guardar carrito en localStorage ── */
        // Recorre todos los productos visibles y guarda un objeto { nombreProducto: cantidad }
        function guardarCarrito() {
            const carrito = {};
            document.querySelectorAll('.categoria li').forEach(li => {
                const nombre   = li.querySelector('.nombre-producto').textContent.trim();
                const cantidad = parseInt(li.querySelector('.cantidad').textContent);
                if (cantidad > 0) carrito[nombre] = cantidad;
            });
            localStorage.setItem('carrito', JSON.stringify(carrito));
        }

        /* ── Restaurar carrito desde localStorage ── */
        // Se llama después de que JS renderiza los productos en el DOM
        function restaurarCarrito() {
            const guardado = localStorage.getItem('carrito');
            if (!guardado) return;
            const carrito = JSON.parse(guardado);
            document.querySelectorAll('.categoria li').forEach(li => {
                const nombre = li.querySelector('.nombre-producto').textContent.trim();
                if (carrito[nombre]) {
                    li.querySelector('.cantidad').textContent = carrito[nombre];
                }
            });
        }

        /* ── Modal de imagen ── */
        function abrirModal(src, titulo) {
            document.getElementById('modal-img').src = src;
            document.getElementById('modal-titulo').textContent = titulo;
            document.getElementById('modal').classList.add('activo');
        }

        function cerrarModal() {
            document.getElementById('modal').classList.remove('activo');
        }

        // Cerrar con tecla Escape
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') cerrarModal();
        });

        /* ── Finalizar pedido ── */
        function finalizarPedido() {
            const items = [];

            document.querySelectorAll('.categoria li').forEach(li => {
                const cantidadSpan = li.querySelector('.cantidad');
                const cantidad = parseInt(cantidadSpan.textContent);
                if (cantidad > 0) {
                    const nombre = li.querySelector('.nombre-producto').textContent.trim();
                    const precio = li.querySelector('.precio').textContent.trim();
                    items.push({ nombre, precio, cantidad });
                    cantidadSpan.textContent = '0';
                }
            });

            if (items.length === 0) {
                // AVISO: reutilizamos el modal en lugar de alert()
                mostrarAviso('Seleccioná al menos un producto antes de finalizar el pedido.');
                return;
            }

            // Armar mensaje para WhatsApp
            let msg = '¡Hola! Quiero hacer el siguiente pedido:%0A%0A';
            items.forEach(i => {
                msg += `• ${i.nombre} x${i.cantidad} (${i.precio})%0A`;
            });
            msg += '%0A¡Gracias!';

            // Abrir WhatsApp con el pedido pre-cargado
            window.open('https://wa.me/541111111111?text=' + msg, '_blank');

            // LOCALSTORAGE: limpiar el carrito guardado una vez enviado el pedido
            localStorage.removeItem('carrito');
        }
    </script>
</body>
</html>
